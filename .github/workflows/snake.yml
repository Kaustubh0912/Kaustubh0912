name: Generate Snake

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write    # <-- FIX 1: grants push access
    steps:
      - uses: Platane/snk@v3
        id: snake
        with:
          github_user_name: Kaustubh0912
          outputs: |
            dist/github-snake.svg
            dist/github-snake-dark.svg?palette=github-dark
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # FIX 2: replaced deprecated crazy-max/ghaction-github-pages
      #         with peaceiris/actions-gh-pages@v4 (Node 24 compatible)
      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: output
